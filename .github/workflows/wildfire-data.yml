name: Update wildfire data
# Fetches NASA FIRMS VIIRS hotspots + NIFC WFIGS perimeters + incidents + NOAA HMS smoke hourly.
# All four datasets are merged into a single wildfire_live.geojson.
# Writes to the orphan `data` branch via a single amended commit (no history growth).
# Frontend fetches from raw.githubusercontent.com (CORS ok on public repos).
# main is never touched by this workflow.
#
# Bootstrap: create the orphan branch once before this workflow runs:
#   git checkout --orphan data
#   git rm -rf .
#   mkdir -p data/layers
#   echo '{"type":"FeatureCollection","features":[]}' > data/layers/wildfire_live.geojson
#   git add data/layers/wildfire_live.geojson
#   git commit -m "init: wildfire data branch"
#   git push origin data
#   git checkout main

# Primary trigger: cron-job.org fires workflow_dispatch hourly. The sparse
# GitHub cron below is disaster insurance only: if cron-job.org (or its PAT)
# silently dies, no runs happen at all — which means no failure alert either —
# and the map would drift stale with nobody notified. Every 6h keeps the data
# under the frontend's 6h kill-switch while adding negligible FIRMS load
# (hourly+ cadence risked rate-limiting; observed Errno 101 runner-IP bans
# 2026-07-03 under burst load).
on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

# Don't let a slow run race the next hour's force-push; queue instead of overlap.
# Shared with odin-outages.yml: every workflow that force-pushes the orphan
# `data` branch must sit in ONE group. Two groups = two runs can check out the
# same tip, and the second `--force-with-lease` push is (correctly) rejected,
# failing that run.
concurrency:
  group: data-branch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20    # guard against a hung upstream fetch (default is 6h)
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          # Fully qualified on purpose: an unqualified `data` makes checkout
          # fetch with a `refs/heads/data*` glob, which also pulls the ~1 GB
          # `data-static` tiles branch every run (~80 s of dead time).
          ref: refs/heads/data             # orphan branch — only the data file
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Force IPv4 for network stability
        # Mitigates common GitHub Actions problem where broken IPv6 routes cause network failures.
        # See: https://github.com/actions/runner-images/issues/668
        run: sudo sed -i 's/^#precedence ::ffff:0:0\/96  100/precedence ::ffff:0:0\/96  100/' /etc/gai.conf

      - name: Verify network connectivity to data sources
        # Fails fast if a required service is unreachable, saving runner minutes and providing a clear error.
        run: |
          echo "::group::Pinging data services..."
          endpoints=(
            "https://firms.modaps.eosdis.nasa.gov"
            "https://services3.arcgis.com"
            "https://cwfis.cfs.nrcan.gc.ca"
            "https://satepsanone.nesdis.noaa.gov"
          )
          for endpoint in "${endpoints[@]}"; do
            if ! curl -s --fail --connect-timeout 15 -o /dev/null "$endpoint"; then
              echo "::error::Failed to connect to $endpoint. Aborting."
              exit 1
            else
              echo "✅ Connection to $endpoint successful."
            fi
          done
          echo "::endgroup::"

      - name: Fetch all feeds → wildfire_live.geojson (with retries)
        # Plain bash retry loop — the retry action ran on the deprecated
        # node20 runtime; job-level timeout-minutes is the hang backstop.
        run: |
          # Scripts live on main; grab without switching branches.
          # The script fetches everything itself (VIIRS CSVs, perimeters,
          # incidents, smoke) when no CSV paths are passed.
          git fetch origin main
          git show origin/main:scripts/fetch_wildfire_live.py > /tmp/fetch_wildfire_live.py
          for i in 1 2 3; do
            python3 /tmp/fetch_wildfire_live.py -o data/layers/wildfire_live.geojson && exit 0
            echo "Attempt $i failed; retrying in 30s…"; sleep 30
          done
          exit 1
        env:
          # FIRMS quota'd area API; script falls back to the anonymous
          # flat files if unset. GitHub masks the key in logs.
          FIRMS_MAP_KEY: ${{ secrets.FIRMS_MAP_KEY }}

      - name: Amend rolling commit and force-push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/layers/wildfire_live.geojson
          git diff --cached --quiet && echo "No change — skipping" && exit 0
          git commit --amend --no-edit --date=now
          git push --force-with-lease
