name: Update ODIN outage data
# Fetches a county-aggregated live power-outage snapshot from the ORNL ODIN
# Opendatasoft portal (server-side group_by/sum/count — no per-outage geometry,
# no pagination) into odin_outages.json.
# Body lives in data-feed.yml (shared with wildfire-data.yml and
# nws-alerts.yml): writes to the orphan `data` branch via a single amended
# commit; frontend fetches from raw.githubusercontent.com; main is never touched.
#
# Bootstrap: create the orphan branch once before this workflow runs (skip if
# the `data` branch already exists from the wildfire workflow — just add the file):
#   git checkout data
#   mkdir -p data/layers
#   echo '{"generated_utc":null,"source_modified":null,"county_count":0,"total_customers_out":0,"counties":{}}' > data/layers/odin_outages.json
#   git add data/layers/odin_outages.json
#   git commit -m "init: odin outages data"
#   git push origin data
#   git checkout main

# Trigger is workflow_dispatch ONLY — an external cron-job.org job fires this
# on a schedule, same as wildfire-data.yml's primary trigger. Unlike wildfire,
# we deliberately do NOT add a sparse GitHub `schedule:` backup here: a
# workflow that never runs on its own goes silent if cron-job.org dies, and
# the map just serves an aging snapshot (the frontend surfaces the snapshot's
# age to the user). We accept that tradeoff for now; a sparse backup cron can
# be added later if this feed proves popular enough to warrant it (see
# wildfire-data.yml for the pattern).
on:
  workflow_dispatch:

# Don't let a slow run race the next cycle's force-push; queue instead of overlap.
# Shared with wildfire-data.yml and nws-alerts.yml — every workflow that
# force-pushes the orphan `data` branch must sit in ONE group. (Every run
# pushes: `generated_utc` changes each pull, so the "no change" guard in
# data-feed.yml never fires here. That keeps the collision window wide —
# hence one group.)
concurrency:
  group: data-branch
  cancel-in-progress: false

jobs:
  fetch:
    uses: ./.github/workflows/data-feed.yml
    permissions:
      contents: write
    secrets: inherit
    with:
      script: scripts/fetch_odin_outages.py
      output: data/layers/odin_outages.json
      endpoints: https://ornl.opendatasoft.com
