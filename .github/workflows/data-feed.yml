name: Live data feed (reusable)
# Shared body for the live-data workflows (wildfire, weather, alerts+outages):
# check out the orphan `data` branch, fetch script(s) from main, run them with
# retries — in parallel when a caller passes several — and force-push the
# amended rolling commit. Callers own their own triggers/cadence and the
# shared `data-branch` concurrency group.
#
# Callers pass `secrets: inherit`; the fetch step exposes the union of secrets
# any feed script reads (each script treats an unset/empty var as absent).
#
# Multi-script runs are failure-isolated: each script gets a per-attempt
# `timeout` sized so 3 attempts + the push fit inside the job's
# timeout-minutes, and whatever succeeded is pushed BEFORE the job reports the
# failure. One hung upstream must never stale a co-located feed.
# Single-script runs keep the old semantics — no per-attempt timeout, the job
# timeout is the only hang backstop (weather's raster attempts legitimately
# run for minutes).

on:
  workflow_call:
    inputs:
      scripts:
        description: "Whitespace-separated fetch script paths on main, e.g. scripts/fetch_wildfire_live.py"
        type: string
        required: true
      outputs:
        description: "Whitespace-separated output paths on the data branch, same order as scripts"
        type: string
        required: true
      endpoints:
        description: "Whitespace-separated URLs to connectivity-check before fetching"
        type: string
        required: true
      timeout-minutes:
        description: "Job timeout — guard against a hung upstream fetch (default GitHub timeout is 6h)"
        type: number
        default: 10
      pip-packages:
        description: "Optional space-separated pip packages the scripts need"
        type: string
        default: ""

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          # Fully qualified on purpose: an unqualified `data` makes checkout
          # fetch with a `refs/heads/data*` glob, which also pulls the ~1 GB
          # `data-static` tiles branch every run (~80 s of dead time).
          ref: refs/heads/data             # orphan branch — only the data files
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Force IPv4 for network stability
        # Mitigates common GitHub Actions problem where broken IPv6 routes cause network failures.
        # See: https://github.com/actions/runner-images/issues/668
        run: sudo sed -i 's/^#precedence ::ffff:0:0\/96  100/precedence ::ffff:0:0\/96  100/' /etc/gai.conf

      - name: Verify network connectivity to data sources
        # Advisory only — a warning breadcrumb for diagnosing genuine outages.
        # This must NOT abort the run: it's a single curl with no retry against
        # each host's landing page, while the fetch step below has a 3×/30s
        # retry loop and the scripts degrade per-subfeed with carry-forward.
        # When it aborted, a flaky FIRMS homepage failed ~19% of wildfire runs
        # whose data API was reachable moments later.
        env:
          ENDPOINTS: ${{ inputs.endpoints }}
        run: |
          echo "::group::Pinging data services..."
          for endpoint in $ENDPOINTS; do
            if ! curl -s --fail --connect-timeout 15 -o /dev/null "$endpoint"; then
              echo "::warning::Endpoint check failed for $endpoint — continuing; the fetch step has its own retries."
            else
              echo "✅ Connection to $endpoint successful."
            fi
          done
          echo "::endgroup::"

      - name: Install Python deps
        if: inputs.pip-packages != ''
        run: pip install --quiet ${{ inputs.pip-packages }}

      - name: Fetch feeds (with retries)
        id: fetch
        # Always exits 0 so the push step lands whatever succeeded; failures
        # are surfaced by the last step, AFTER the push.
        run: |
          # Scripts live on main; grab without switching branches. They must
          # already be merged to main before this workflow can run, since
          # this reads them from origin/main rather than the checked-out
          # `data` ref.
          git fetch origin main
          # Shared helper the fetch scripts import (write_json_atomic). The
          # scripts run from /tmp, so their sibling module must be there too.
          git show "origin/main:scripts/geo_common.py" > /tmp/geo_common.py
          # Zone-key list fetch_nws_alerts.py validates against (R7 vintage
          # drift check); harmless extra copy for the other feeds. Fail-open:
          # if it's ever missing on main, remove the empty redirect target so
          # the script skips validation instead of flagging every zone.
          git show "origin/main:scripts/nws_zone_keys.txt" > /tmp/nws_zone_keys.txt \
            || rm -f /tmp/nws_zone_keys.txt

          read -ra SCRIPTS <<< "${{ inputs.scripts }}"
          read -ra OUTPUTS <<< "${{ inputs.outputs }}"
          if (( ${#SCRIPTS[@]} != ${#OUTPUTS[@]} )); then
            echo "::error::scripts/outputs count mismatch"; exit 1
          fi

          # Per-attempt timeout so one hung feed can't eat the whole job
          # before the push step runs: 3 attempts + 2×30s sleeps + push must
          # fit under timeout-minutes. Multi-script jobs only — 0 disables
          # `timeout`, keeping single-script callers on job-timeout-only.
          ATTEMPT=0
          if (( ${#SCRIPTS[@]} > 1 )); then
            ATTEMPT=$(( (${{ inputs.timeout-minutes }} * 60 - 120) / 3 ))
          fi

          pids=()
          for i in "${!SCRIPTS[@]}"; do
            git show "origin/main:${SCRIPTS[$i]}" > "/tmp/fetch_feed_$i.py"
            (
              for a in 1 2 3; do
                timeout "$ATTEMPT" python3 "/tmp/fetch_feed_$i.py" -o "${OUTPUTS[$i]}" && exit 0
                echo "${SCRIPTS[$i]}: attempt $a failed; retrying in 30s…"; sleep 30
              done
              exit 1
            ) & pids+=($!)
          done

          FAILED=""
          for i in "${!pids[@]}"; do
            wait "${pids[$i]}" || FAILED="$FAILED ${SCRIPTS[$i]}"
          done
          echo "failed=${FAILED# }" >> "$GITHUB_OUTPUT"
        env:
          # FIRMS quota'd area API (wildfire); script falls back to the
          # anonymous flat files if unset. GitHub masks the key in logs.
          FIRMS_MAP_KEY: ${{ secrets.FIRMS_MAP_KEY }}
          # Optional (ODIN). ORNL Opendatasoft's anonymous quota is 5000
          # req/day per IP and runners share pooled IPs; a key removes a small
          # shared-neighbour 429 risk. Without it the script warns and
          # proceeds anonymously (no --require-key here).
          ODIN_ODS_APIKEY: ${{ secrets.ODIN_ODS_APIKEY }}

      - name: Amend rolling commit and force-push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ inputs.outputs }}
          git diff --cached --quiet && echo "No change — skipping" && exit 0
          git commit --amend --no-edit --date=now
          git push --force-with-lease

      - name: Surface fetch failures
        # After the push on purpose: a failed feed must not block the
        # successful one's data from landing.
        if: steps.fetch.outputs.failed != ''
        run: |
          echo "::error::Feed script(s) failed after retries: ${{ steps.fetch.outputs.failed }}"
          exit 1
