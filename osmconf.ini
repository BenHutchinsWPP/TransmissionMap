#
# Project-local OGR osmconf.ini — patched from system default.
#
# KEY CHANGE vs system default:
#   closed_ways_are_polygons now includes "power" so that closed OSM ways
#   tagged power=substation / power=plant / etc. are placed in the
#   OGR "multipolygons" layer instead of being dropped.  Without this,
#   ogr2ogr only sees relation-based multipolygons (~519 for NA substations)
#   and misses the ~80,000 closed-way polygon substations.
#
# NOTE: remove the below "[general]" line for GDAL < 3.10
[general]

closed_ways_are_polygons=aeroway,amenity,boundary,building,craft,geological,historic,landuse,leisure,military,natural,office,place,power,shop,sport,tourism,highway=platform,public_transport=platform

#attribute_name_laundering=no
#report_all_tags=yes
#report_all_nodes=yes
#report_all_ways=yes
#tags_format=json

[points]
osm_id=yes
osm_version=no
osm_timestamp=no
osm_uid=no
osm_user=no
osm_changeset=no

attributes=name,barrier,highway,ref,address,is_in,place,man_made
unsignificant=created_by,converted_by,source,time,ele,attribution
ignore=created_by,converted_by,source,time,ele,note,todo,openGeoDB:,fixme,FIXME

[lines]
osm_id=yes
osm_version=no
osm_timestamp=no
osm_uid=no
osm_user=no
osm_changeset=no

# Power-line tags promoted to direct columns.  Everything not listed here is
# packed into the single `other_tags` hstore string, which ESRI Shapefile's DBF
# truncates at 254 chars — silently amputating whatever sorts last (voltage,
# wires, ...) on tag-heavy ways.  That dropped voltage on ~740 lines, including
# the Pacific DC Intertie.  Do NOT promote `power`, `operator` or `ref`: the
# power_line WHERE clause and the pipeline layers still read those out of
# other_tags (see extract_osm_lines.py / enrich_osm_tags.py).
attributes=name,highway,waterway,aerialway,barrier,man_made,railway,voltage,cables,circuits,frequency,location,wires
ignore=created_by,converted_by,source,time,ele,note,todo,openGeoDB:,fixme,FIXME,tiger:,check_date

computed_attributes=z_order
z_order_type=Integer
z_order_sql="SELECT (CASE [highway] WHEN 'minor' THEN 3 WHEN 'road' THEN 3 WHEN 'unclassified' THEN 3 WHEN 'residential' THEN 3 WHEN 'tertiary_link' THEN 4 WHEN 'tertiary' THEN 4 WHEN 'secondary_link' THEN 6 WHEN 'secondary' THEN 6 WHEN 'primary_link' THEN 7 WHEN 'primary' THEN 7 WHEN 'trunk_link' THEN 8 WHEN 'trunk' THEN 8 WHEN 'motorway_link' THEN 9 WHEN 'motorway' THEN 9 ELSE 0 END) + (CASE WHEN [bridge] IN ('yes', 'true', '1') THEN 10 ELSE 0 END) + (CASE WHEN [tunnel] IN ('yes', 'true', '1') THEN -10 ELSE 0 END) + (CASE WHEN [railway] IS NOT NULL THEN 5 ELSE 0 END) + (CASE WHEN [layer] IS NOT NULL THEN 10 * CAST([layer] AS INTEGER) ELSE 0 END)"

[multipolygons]
osm_id=yes
osm_version=no
osm_timestamp=no
osm_uid=no
osm_user=no
osm_changeset=no

# "power" added to attributes so it is promoted to a direct OGR column
# (rather than buried in other_tags), enabling efficient WHERE power='substation' queries.
attributes=name,type,aeroway,amenity,admin_level,barrier,boundary,building,craft,geological,historic,land_area,landuse,leisure,man_made,military,natural,office,place,power,shop,sport,tourism
ignore=area,created_by,converted_by,source,time,ele,note,todo,openGeoDB:,fixme,FIXME

[multilinestrings]
osm_id=yes
osm_version=no
osm_timestamp=no
osm_uid=no
osm_user=no
osm_changeset=no

attributes=name,type
ignore=area,created_by,converted_by,source,time,ele,note,todo,openGeoDB:,fixme,FIXME

[other_relations]
osm_id=yes
osm_version=no
osm_timestamp=no
osm_uid=no
osm_user=no
osm_changeset=no

attributes=name,type
ignore=area,created_by,converted_by,source,time,ele,note,todo,openGeoDB:,fixme,FIXME
